services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: goalforge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: ./apps/api
    ports:
      - "8000:8000"
    env_file: ./apps/api/.env
    depends_on:
      - db

  web:
    build: ./apps/web
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  pgdata:
