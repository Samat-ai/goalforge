services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: goalforge
      POSTGRES_USER: postgres
      # Override in production via a root .env file (POSTGRES_PASSWORD=...) and
      # keep DATABASE_URL in apps/api/.env in sync. Default only for local dev.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    # Not published to the host — only `api` needs to reach it, over the
    # compose network. For local psql access, add a docker-compose.override.yml
    # with a `ports: ["5432:5432"]` entry on this service instead of editing here.
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: ./apps/api
    restart: unless-stopped
    # Loopback-only: Docker's iptables rules bypass ufw, so a bare "8000:8000"
    # exposes the API to the internet over plain HTTP even with a firewall on.
    # Caddy reaches this container over the compose network; the host binding
    # exists only for local debugging.
    ports:
      - "127.0.0.1:8000:8000"
    env_file: ./apps/api/.env
    # Service-account key for Vertex AI billing mode (gitignored; folder may be
    # empty when running on the AI Studio API key — the mount is harmless then).
    volumes:
      - ./apps/api/secrets:/app/secrets:ro
    depends_on:
      - db

  web:
    build: ./apps/web
    restart: unless-stopped
    # Loopback-only for the same reason as `api` above.
    ports:
      - "127.0.0.1:5173:8080"
    depends_on:
      - api

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  celery_worker:
    build:
      context: ./apps/api
    command: celery -A celery_app worker --loglevel=info -Q default,ai_generation,notifications -c 4
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    restart: unless-stopped

  celery_beat:
    build:
      context: ./apps/api
    command: celery -A celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  pgdata:
  redis_data:
