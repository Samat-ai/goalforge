name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    env:
      GEMINI_API_KEY: "dummy_gemini_key_for_testing"
      CLERK_SECRET_KEY: "dummy_clerk_key_for_testing"
      CLERK_JWKS_URL: "https://dummy.clerk.com/.well-known/jwks.json"
      DATABASE_URL: "sqlite+aiosqlite:///:memory:"
      RATE_LIMIT_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install test dependencies
        run: pip install "pytest>=9.0" "pytest-asyncio==1.3.0" "anyio>=4.0" "pytest-timeout" httpx aiosqlite

      - name: Run tests
        run: python -m pytest tests/ -v --timeout=60

  backend-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_db
      GEMINI_API_KEY: "dummy_gemini_key_for_testing"
      CLERK_SECRET_KEY: "dummy_clerk_key_for_testing"
      CLERK_JWKS_URL: "https://dummy.clerk.com/.well-known/jwks.json"
      RATE_LIMIT_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r apps/api/requirements.txt

      - name: Install test dependencies
        run: pip install "pytest>=9.0" "pytest-asyncio==1.3.0" "anyio>=4.0" "pytest-timeout" httpx asyncpg

      - name: Run migrations
        run: |
          cd apps/api
          alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_db

      - name: Check migration completeness
        run: |
          cd apps/api
          alembic check
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_db

      - name: Check for migration head conflicts
        run: |
          cd apps/api
          HEADS=$(alembic heads | wc -l)
          if [ "$HEADS" -gt 1 ]; then
            echo "ERROR: Multiple migration heads detected:"
            alembic heads
            exit 1
          fi
          echo "Migration chain is clean (single head)"
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_db

      - name: Run tests
        run: |
          cd apps/api
          python -m pytest tests/ -v --timeout=60
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_db

  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
