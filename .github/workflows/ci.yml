name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────
  backend-lint:
    name: Backend — Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt
      - run: pip install ruff
      - name: Lint (ruff check)
        run: ruff check . --output-format=github
      - name: Format check (ruff format)
        run: ruff format --check .

  backend-test:
    name: Backend — Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: goalforge
          POSTGRES_PASSWORD: goalforge
          POSTGRES_DB: goalforge_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://goalforge:goalforge@localhost:5432/goalforge_test
      GEMINI_API_KEY: test-key-not-real
      CLERK_JWKS_URL: http://localhost/not-real
      ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt
      - run: pip install -r requirements.txt pytest-cov
      - name: Run migrations
        run: alembic upgrade head
      - name: Run tests with coverage
        run: |
          pytest --cov=. --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=60 -v
      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: apps/api/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # ── Frontend ─────────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend — Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - name: TypeScript type check
        run: npx tsc --noEmit
      - name: ESLint
        run: npx eslint . --max-warnings=0

  frontend-build:
    name: Frontend — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
          retention-days: 7

  # ── Summary ───────────────────────────────────────────────────────────────
  ci-success:
    name: CI Passed
    needs: [backend-lint, backend-test, frontend-lint, frontend-build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.backend-lint.result }}" != "success" || \
                "${{ needs.backend-test.result }}" != "success" || \
                "${{ needs.frontend-lint.result }}" != "success" || \
                "${{ needs.frontend-build.result }}" != "success" ]]; then
            echo "One or more CI jobs failed"
            exit 1
          fi
          echo "All CI jobs passed ✅"
